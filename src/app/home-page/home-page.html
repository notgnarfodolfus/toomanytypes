<main class="flex justify-center px-4 py-8">
  <div class="w-full max-w-5xl flex flex-col gap-6">
    <section class="grid grid-cols-1 md:grid-cols-2 gap-6">
      <mat-card class="p-4">
        <mat-card-title>Attack</mat-card-title>
        <mat-card-content>
          <form [formGroup]="attacker">
            <app-type-multi-selector
              formControlName="select"
              label="Attack Types"
              [maxSelection]="0"
            >
            </app-type-multi-selector>
          </form>
        </mat-card-content>
      </mat-card>

      <mat-card class="p-4">
        <mat-card-title>Defender</mat-card-title>
        <mat-card-content>
          <form [formGroup]="defender">
            <app-type-multi-selector
              formControlName="select"
              label="Defender Types (max 3)"
              [maxSelection]="3"
            >
            </app-type-multi-selector>
          </form>
        </mat-card-content>
      </mat-card>
    </section>
    @if (hasDefender()) {
      <mat-card class="p-4 min-h-[160px]">
        <mat-card-title>Multipliers</mat-card-title>
        <mat-card-content>
          <mat-list>
            @for (match of getMatchupRatings(); track match.rating) {
              <mat-list-item>
                <span>
                  <mat-chip-set class="inline-chips">
                    @for (atk of match.attacker; track atk.name) {
                      <mat-chip [ngStyle]="{ 'background-color': atk.color, color: '#fff' }">
                        {{ atk.name }}
                      </mat-chip>
                    }
                  </mat-chip-set>
                  deals
                  <span class="font-bold" [ngStyle]="{ color: match.color }"
                    >{{ match.rating }}x</span
                  >
                  damage
                </span>
              </mat-list-item>
              <mat-divider></mat-divider>
            }
          </mat-list>
        </mat-card-content>
      </mat-card>
    }
  </div>
</main>
