<div class="chips-container">
  <mat-chip-listbox>
    @for (type of selectCtrl.value; track type.name) {
      <mat-chip
        [removable]="true"
        (removed)="remove(type)"
        [ngStyle]="{ 'background-color': type.color, color: '#fff' }"
      >
        {{ type.name }}
        <button matChipRemove>
          <mat-icon>cancel</mat-icon>
        </button>
      </mat-chip>
    }
  </mat-chip-listbox>
</div>

<div class="select-row">
  <mat-form-field appearance="outline" class="full-width" subscriptSizing="dynamic">
    <mat-label>{{ label }}</mat-label>

    <mat-select [formControl]="selectCtrl" multiple>
      <mat-option>
        <ngx-mat-select-search [formControl]="searchCtrl"> </ngx-mat-select-search>
      </mat-option>

      @for (option of filteredOptions; track option.name) {
        <mat-option [value]="option" [disabled]="isDisabled(option)">
          {{ option.name }}
        </mat-option>
      }
    </mat-select>
  </mat-form-field>

  <button
    mat-stroked-button
    class="clear-btn"
    (click)="clearAll()"
    [disabled]="!selectCtrl.value?.length"
    matTooltip="Clear selection"
  >
    <mat-icon>delete</mat-icon>
  </button>
</div>
